<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lip Blam Store</title>
<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header{background:black; color:white; padding:20px; text-align:center;}
nav{background:#333; padding:10px; text-align:center;}
nav a{color:white; margin:15px; text-decoration:none; font-size:18px;}
.container{display:flex; flex-wrap:wrap; justify-content:center;}
.product{background:white; margin:20px; padding:15px; width:250px; border-radius:10px; box-shadow:0px 0px 10px gray; text-align:center;}
.product img{width:200px; height:200px;}
button{background:black; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;}
.cart{position:fixed; right:10px; top:10px; background:white; padding:15px; border-radius:10px; box-shadow:0px 0px 10px gray;}
</style>
</head>
<body>
<header>
<h1>Lip Blam Store</h1>
<p>Best lip blam Deals</p>
</header>
<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</nav>
<div class="cart">
🛒 Cart: <span id="total">0</span> $
</div>
<div class="container">
<div class="product">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ4l1d_bPEJW3y7jLy_IaBl1D4Ho3HLYpb4fw&s">
<h3>Laptop HP</h3>
<p>700$</p>
<button onclick="add(700)">Add to Cart</button>
</div>
<div class="product">
<img src="https://baskinnature.in/wp-content/uploads/2024/08/Pink.webp">
<h3>Dell Laptop</h3>
<p>800$</p>
<button onclick="add(800)">Add to Cart</button>
</div>
<div class="product">
<img src="https://swissbeauty.in/cdn/shop/files/SB-334_01StrawberrySlush_1.jpg?v=1748633094&width=620">
<h3>Lenovo Laptop</h3>
<p>650$</p>
<button onclick="add(650)">Add to Cart</button>
</div>
</div>
<script>
let total=0;
function add(price){ total+=price; document.getElementById("total").innerHTML=total; }
</script>
</body>
</html>
